name: Pre-market swing scan

# Runs 1 hour before US market open (8:30am ET = 13:30 UTC during EDT, 14:30 UTC during EST).
# We schedule TWO crons covering both DST regimes; the script itself checks the actual ET clock
# and exits early if it's not actually 1 hour before the open, so we never double-run.
#
# Also runnable manually from the Actions tab via workflow_dispatch.

on:
  schedule:
    # 13:30 UTC = 8:30am EDT (Mar–Nov)
    - cron: "30 13 * * 1-5"
    # 14:30 UTC = 8:30am EST (Nov–Mar)
    - cron: "30 14 * * 1-5"
  workflow_dispatch:   # manual trigger button in the GitHub UI

# Cancel any in-flight scan if a new one starts (rare, but cleaner)
concurrency:
  group: premarket-scan
  cancel-in-progress: true

# Permissions: we need to commit results.json back to the repo
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify timing (skip if not ~1h before market open)
        id: timing
        run: |
          python - <<'EOF'
          # The two cron schedules above mean one of them always fires at the wrong wall time
          # depending on DST. Bail out if NYC local time is not within a sensible pre-market window.
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os, sys
          now_et = datetime.now(ZoneInfo("America/New_York"))
          hour, minute = now_et.hour, now_et.minute
          # Market opens at 9:30am ET. Run window: 8:00am-9:00am ET (Mon-Fri).
          ok = (now_et.weekday() < 5) and (
              (hour == 8 and 0 <= minute <= 59)
          )
          print(f"NYC time now: {now_et:%Y-%m-%d %H:%M %Z}")
          if not ok:
              print("Outside pre-market window — skipping scan.")
              # Write a flag the next step can read
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_run=false\n")
              sys.exit(0)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("should_run=true\n")
          EOF

      - name: Run swing screener
        if: steps.timing.outputs.should_run == 'true'
        run: python swing_screener.py

      - name: Commit results
        if: steps.timing.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "premarket scan $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi

      - name: Upload as workflow artifact
        if: steps.timing.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}
          path: results.json
          retention-days: 30
