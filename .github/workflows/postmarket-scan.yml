name: Post-market swing scan

# Runs 1 hour after the US regular-session close (5:00pm ET) Mon-Fri.
# 5pm ET = 21:00 UTC during EDT (Mar-Nov) and 22:00 UTC during EST (Nov-Mar).
# Two crons cover both DST regimes; the timing check inside the run exits early
# on whichever cron is wrong for the current DST, so the scan runs exactly once.
#
# Also runnable manually from the Actions tab via workflow_dispatch.

on:
  schedule:
    # 21:00 UTC = 5:00pm EDT (Mar–Nov)
    - cron: "0 21 * * 1-5"
    # 22:00 UTC = 5:00pm EST (Nov–Mar)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
  # Re-deploy Pages whenever the dashboard or results.json is updated on main
  push:
    branches: [main]
    paths:
      - "dashboard.html"
      - "results.json"

concurrency:
  group: postmarket-scan
  cancel-in-progress: true

permissions:
  contents: write       # commit results.json back to the repo
  pages: write          # deploy to GitHub Pages
  id-token: write       # required by deploy-pages action

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # =========================================================================
  # JOB 1 — Run the screener at 5pm ET on weekdays, commit results.json
  # =========================================================================
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip the scan job when this workflow was triggered by a push
    # (the push handler is just there to redeploy Pages)
    if: github.event_name != 'push'

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify timing (skip if not actually 5pm ET on a weekday)
        id: timing
        run: |
          python - <<'EOF'
          # The two cron schedules above mean one fires at the wrong wall time
          # depending on DST. Bail out if NYC local time is not within 4:30pm-6pm ET.
          # Also skip if it's a workflow_dispatch (manual trigger) — that always runs.
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os, sys
          # Manual triggers always proceed
          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              print("Manual trigger — proceeding regardless of time.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_run=true\n")
              sys.exit(0)
          now_et = datetime.now(ZoneInfo("America/New_York"))
          hour, minute = now_et.hour, now_et.minute
          # Post-close window: 4:30pm-6:00pm ET (Mon-Fri)
          ok = (now_et.weekday() < 5) and (
              (hour == 16 and minute >= 30)
              or (hour == 17)
              or (hour == 18 and minute == 0)
          )
          print(f"NYC time now: {now_et:%Y-%m-%d %H:%M %Z}")
          flag = "true" if ok else "false"
          if not ok:
              print("Outside post-close window — skipping scan.")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={flag}\n")
          EOF

      - name: Run swing screener
        if: steps.timing.outputs.should_run == 'true'
        env:
          # On manual triggers, force the screener to run even on weekends/holidays
          # so the user can test or get an on-demand scan whenever they want.
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          if [ "$FORCE_RUN" = "true" ]; then
            python -c "from swing_screener import run; run(skip_non_market_days=False)"
          else
            python swing_screener.py
          fi

      - name: Commit results
        if: steps.timing.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "postmarket scan $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi

      - name: Upload as workflow artifact
        if: steps.timing.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}
          path: results.json
          retention-days: 30

  # =========================================================================
  # JOB 2 — Deploy the dashboard to GitHub Pages
  # Runs after the scan, OR on a push to dashboard.html / results.json,
  # OR on manual dispatch.
  # =========================================================================
  deploy-pages:
    runs-on: ubuntu-latest
    needs: [scan]
    # Even if `scan` was skipped (e.g. push trigger), still run this job
    if: always() && (needs.scan.result == 'success' || needs.scan.result == 'skipped')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repo (pull latest, including any commit from scan job)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage site files
        run: |
          # Build a clean site folder with just what Pages needs
          mkdir -p _site
          cp dashboard.html _site/index.html      # serve dashboard as the homepage
          cp dashboard.html _site/dashboard.html  # also keep original path
          cp results.json _site/
          cp icon.svg _site/                       # favicon

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
